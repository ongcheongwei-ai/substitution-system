<script>
// ============================================================
// DATA LAYER
// ============================================================
const DAY_NAMES = {1:'星期一',2:'星期二',3:'星期三',4:'星期四',5:'星期五',6:'星期六',0:'星期日'};
const MAX_CONSECUTIVE = 4;

const DEFAULT_PERIOD_TIMES = {
  1:'07:30-08:10', 2:'08:10-08:50', 3:'08:50-09:30', 4:'09:30-10:10',
  5:'10:30-11:10', 6:'11:10-11:50', 7:'12:30-13:10', 8:'13:10-13:50',
  9:'13:50-14:30', 10:'14:30-15:10'
};

// Local storage keys
const LS_TEACHERS = 'sub_teachers';       // [{id, code, name, full_code}]
const LS_TIMETABLE = 'sub_timetable';     // [{teacher_id, day_of_week, period, content}]
const LS_API_URL = 'sub_api_url';
const LS_PERIOD_TIMES = 'sub_period_times';

// In-memory caches (loaded from localStorage)
let teachers = [];      // [{id, code, name, full_code}]
let timetable = [];     // [{teacher_id, day_of_week, period, content}]
let apiUrl = '';
let periodTimes = { ...DEFAULT_PERIOD_TIMES };

// Records cache for the current session (fetched from Google Sheets)
let cachedRecords = [];       // All records from Google Sheets
let cachedRecordsLoaded = false;

function loadLocalData() {
  try {
    teachers = JSON.parse(localStorage.getItem(LS_TEACHERS) || '[]');
    timetable = JSON.parse(localStorage.getItem(LS_TIMETABLE) || '[]');
    apiUrl = localStorage.getItem(LS_API_URL) || '';
    const pt = localStorage.getItem(LS_PERIOD_TIMES);
    if (pt) periodTimes = JSON.parse(pt);
  } catch(e) {
    console.error('Failed to load local data', e);
  }
}

function saveTeachers() { localStorage.setItem(LS_TEACHERS, JSON.stringify(teachers)); }
function saveTimetable() { localStorage.setItem(LS_TIMETABLE, JSON.stringify(timetable)); }

// ============================================================
// GOOGLE SHEETS API
// ============================================================
async function gsApi(params) {
  if (!apiUrl) throw new Error('请先在设置页面配置 Google Apps Script URL');
  const url = new URL(apiUrl);
  Object.entries(params).forEach(([k, v]) => { if (v !== undefined && v !== null) url.searchParams.set(k, v); });
  const resp = await fetch(url.toString());
  return await resp.json();
}

async function gsApiPost(params, body) {
  if (!apiUrl) throw new Error('请先在设置页面配置 Google Apps Script URL');
  const url = new URL(apiUrl);
  Object.entries(params).forEach(([k, v]) => { if (v !== undefined && v !== null) url.searchParams.set(k, v); });
  const resp = await fetch(url.toString(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return await resp.json();
}

// Fetch all records (with caching)
async function fetchAllRecords(force) {
  if (cachedRecordsLoaded && !force) return cachedRecords;
  try {
    const data = await gsApi({ action: 'get_records' });
    cachedRecords = data.records || [];
    cachedRecordsLoaded = true;
  } catch (e) {
    console.warn('无法连接 Google Sheets，使用本地缓存', e);
    cachedRecords = [];
  }
  return cachedRecords;
}

function getRecordsForDate(date) {
  return cachedRecords.filter(r => r.date === date);
}

function getTotalSubCount(teacherName) {
  return cachedRecords.filter(r => r.substitute_teacher === teacherName).length;
}

function getTodaySubCount(teacherName, date) {
  return cachedRecords.filter(r => r.substitute_teacher === teacherName && r.date === date).length;
}

function getAssignedPeriodsForDate(date) {
  // returns { teacherName: Set([period...]) }
  const assigned = {};
  cachedRecords.filter(r => r.date === date).forEach(r => {
    if (!assigned[r.substitute_teacher]) assigned[r.substitute_teacher] = new Set();
    assigned[r.substitute_teacher].add(parseInt(r.period));
  });
  return assigned;
}

// ============================================================
// TIMETABLE PARSER (client-side using SheetJS)
// ============================================================
function parseTeacherName(fullCode) {
  const m = fullCode.match(/^([A-Za-z_]+)([\u4e00-\u9fff].*)$/);
  if (m) return { code: m[1], name: m[2] };
  return { code: fullCode, name: fullCode };
}

function parseCellContent(value) {
  if (value == null) return null;
  const text = String(value).trim();
  if (!text) return null;
  if (text.includes('\n')) {
    const parts = text.split('\n');
    return { class_info: parts[0].trim(), subject: parts[1].trim() };
  }
  return { class_info: text, subject: text };
}

function importTimetable() {
  const fileInput = document.getElementById('timetableFile');
  const statusEl = document.getElementById('importStatus');
  if (!fileInput.files.length) {
    statusEl.innerHTML = '<div class="alert alert-warning py-1">请选择文件</div>';
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });

      // Find the sheet - try "Table 1" first, then first sheet
      let sheetName = 'Table 1';
      if (!wb.SheetNames.includes(sheetName)) sheetName = wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];

      const range = XLSX.utils.decode_range(ws['!ref']);
      const newTeachers = [];
      const newTimetable = [];
      let teacherId = 1;

      for (let row = 2; row <= range.e.r; row++) { // row 0=header1, row 1=header2, data from row 2
        const cellA = ws[XLSX.utils.encode_cell({ r: row, c: 0 })];
        if (!cellA || !cellA.v) continue;
        const fullCode = String(cellA.v).trim();
        if (!fullCode || fullCode === '#N/A') continue;

        const { code, name } = parseTeacherName(fullCode);
        const tid = teacherId++;
        newTeachers.push({ id: tid, code, name, full_code: fullCode });

        for (let day = 1; day <= 5; day++) {
          for (let period = 1; period <= 10; period++) {
            const col = (day - 1) * 10 + period; // col 1 is A (teacher name), col 1+ is timetable
            const cell = ws[XLSX.utils.encode_cell({ r: row, c: col })];
            if (cell && cell.v != null) {
              const content = String(cell.v).trim();
              if (content) {
                newTimetable.push({ teacher_id: tid, day_of_week: day, period: period, content: content });
              }
            }
          }
        }
      }

      teachers = newTeachers;
      timetable = newTimetable;
      saveTeachers();
      saveTimetable();

      statusEl.innerHTML = `<div class="alert alert-success py-1">导入成功！${teachers.length} 位老师，${timetable.length} 条课程记录</div>`;
      updateTimetableInfo();
    } catch (err) {
      statusEl.innerHTML = `<div class="alert alert-danger py-1">导入失败: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function updateTimetableInfo() {
  const el = document.getElementById('timetableInfo');
  if (el) {
    if (teachers.length > 0) {
      el.textContent = `已导入课表: ${teachers.length} 位老师`;
    } else {
      el.textContent = '尚未导入课表';
    }
  }
}

// ============================================================
// TIMETABLE QUERIES (local)
// ============================================================
function getTeacherSchedule(teacherId, dayOfWeek) {
  const schedule = {};
  for (let p = 1; p <= 10; p++) schedule[p] = null;
  timetable.filter(t => t.teacher_id === teacherId && t.day_of_week === dayOfWeek)
    .forEach(t => { schedule[t.period] = t.content; });
  return schedule;
}

function searchTeachers(query) {
  if (!query) return [];
  const q = query.toLowerCase();
  return teachers.filter(t =>
    t.full_code.toLowerCase().includes(q) ||
    t.name.toLowerCase().includes(q) ||
    t.code.toLowerCase().includes(q)
  ).slice(0, 20);
}

function getTeacherById(id) {
  return teachers.find(t => t.id === id);
}

function getDayOfWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=Sun
  // Convert: 1=Mon...5=Fri
  if (dow === 0) return 7;
  return dow;
}

// ============================================================
// RECOMMENDATION ENGINE (runs locally)
// ============================================================
function checkMaxConsecutive(busySet, newPeriod) {
  const all = new Set(busySet);
  all.add(newPeriod);
  let left = newPeriod;
  while (all.has(left - 1)) left--;
  let right = newPeriod;
  while (all.has(right + 1)) right++;
  return right - left + 1;
}

function recommendSubstitutes(date, dayOfWeek, period, absentTeacherName) {
  const assigned = getAssignedPeriodsForDate(date);
  const candidates = [];

  teachers.forEach(t => {
    if (t.full_code === absentTeacherName) return;

    const schedule = getTeacherSchedule(t.id, dayOfWeek);
    const busyPeriods = [];
    for (let p = 1; p <= 10; p++) {
      if (schedule[p] !== null) busyPeriods.push(p);
    }

    if (busyPeriods.length === 0) return; // not working today

    const firstPeriod = Math.min(...busyPeriods);
    const lastPeriod = Math.max(...busyPeriods);

    // Must be free this period
    if (schedule[period] !== null) return;

    // Check if already assigned this period
    const teacherAssigned = assigned[t.full_code];
    if (teacherAssigned && teacherAssigned.has(period)) return;

    // Determine tag
    let tag;
    if (period < firstPeriod) tag = 'early';
    else if (period > lastPeriod) tag = 'late';
    else tag = 'normal';

    // Build busy set (regular + assigned)
    const busySet = new Set(busyPeriods);
    if (teacherAssigned) teacherAssigned.forEach(p => busySet.add(p));

    const consecutive = checkMaxConsecutive(busySet, period);
    const consecutiveWarning = consecutive >= MAX_CONSECUTIVE;

    const totalSubs = getTotalSubCount(t.full_code);
    const todaySubs = getTodaySubCount(t.full_code, date);

    candidates.push({
      teacher_id: t.id,
      full_code: t.full_code,
      total_subs: totalSubs,
      today_subs: todaySubs,
      tag: tag,
      first_period: firstPeriod,
      last_period: lastPeriod,
      consecutive: consecutive,
      consecutive_warning: consecutiveWarning
    });
  });

  // Sort
  const tagOrder = { normal: 0, early: 1, late: 1 };
  candidates.sort((a, b) =>
    (tagOrder[a.tag] - tagOrder[b.tag]) ||
    (a.consecutive_warning - b.consecutive_warning) ||
    (a.today_subs - b.today_subs) ||
    (a.total_subs - b.total_subs) ||
    a.full_code.localeCompare(b.full_code)
  );

  return candidates.slice(0, 50);
}

// ============================================================
// UI: PAGE NAVIGATION
// ============================================================
function showPage(name) {
  ['arrange', 'records', 'statistics', 'settings'].forEach(p => {
    document.getElementById('page-' + p).classList.toggle('d-none', p !== name);
  });
  if (name === 'records') loadRecords();
  if (name === 'statistics') { initStatYears(); loadStats(); }
  if (name === 'settings') {
    document.getElementById('apiUrlInput').value = apiUrl;
    renderPeriodTimesEditor();
    updateTimetableInfo();
  }
}

// ============================================================
// UI: ARRANGE PAGE
// ============================================================
let absentList = []; // [{id, full_code, classes, selectedPeriods}]

function updateDayLabel() {
  const dateStr = document.getElementById('dateInput').value;
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay();
  const label = document.getElementById('dayLabel');
  label.textContent = DAY_NAMES[dow] || '';
  if (dow === 0 || dow === 6) {
    label.innerHTML = '<span class="text-danger">' + DAY_NAMES[dow] + '（非工作日）</span>';
  }
}

document.getElementById('dateInput').addEventListener('change', function() {
  updateDayLabel();
  loadTodaySummary();
  resetAll();
});

// Teacher search
let searchTimeout;
document.getElementById('teacherSearch').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (q.length < 1) { hideDropdown(); return; }
  searchTimeout = setTimeout(() => {
    const existingIds = new Set(absentList.map(a => a.id));
    const results = searchTeachers(q).filter(t => !existingIds.has(t.id));
    showDropdown(results);
  }, 100);
});

function showDropdown(list) {
  const dd = document.getElementById('searchDropdown');
  if (list.length === 0) { hideDropdown(); return; }
  dd.innerHTML = list.map(t =>
    `<div class="search-dropdown-item" onclick="addAbsentTeacher(${t.id})">${t.full_code}</div>`
  ).join('');
  dd.classList.remove('d-none');
}

function hideDropdown() {
  document.getElementById('searchDropdown').classList.add('d-none');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#teacherSearch') && !e.target.closest('#searchDropdown')) hideDropdown();
});

function addAbsentTeacher(id) {
  hideDropdown();
  document.getElementById('teacherSearch').value = '';

  if (absentList.find(a => a.id === id)) return;

  const teacher = getTeacherById(id);
  if (!teacher) return;

  const dateStr = document.getElementById('dateInput').value;
  const dow = getDayOfWeek(dateStr);
  if (dow > 5) { alert('该日期不是工作日'); return; }

  const schedule = getTeacherSchedule(id, dow);
  const classes = [];
  for (let p = 1; p <= 10; p++) {
    if (schedule[p]) {
      const parsed = parseCellContent(schedule[p]);
      if (parsed) {
        classes.push({ period: p, class_info: parsed.class_info, subject: parsed.subject, raw: schedule[p] });
      }
    }
  }

  absentList.push({
    id: id,
    full_code: teacher.full_code,
    classes: classes,
    selectedPeriods: classes.map(c => c.period)
  });
  renderAbsentList();
}

function removeAbsentTeacher(id) {
  absentList = absentList.filter(a => a.id !== id);
  renderAbsentList();
  document.getElementById('recommendSection').classList.add('d-none');
  document.getElementById('placeholder').classList.remove('d-none');
}

function togglePeriod(teacherId, period) {
  const teacher = absentList.find(a => a.id === teacherId);
  if (!teacher) return;
  const idx = teacher.selectedPeriods.indexOf(period);
  if (idx >= 0) teacher.selectedPeriods.splice(idx, 1);
  else { teacher.selectedPeriods.push(period); teacher.selectedPeriods.sort((a,b) => a-b); }
  renderAbsentList();
}

function renderAbsentList() {
  const container = document.getElementById('absentTeachers');
  const listSection = document.getElementById('absentTeacherList');
  const arrangeButtons = document.getElementById('arrangeButtons');
  const countBadge = document.getElementById('absentCount');

  if (absentList.length === 0) {
    listSection.classList.add('d-none');
    arrangeButtons.classList.add('d-none');
    return;
  }

  listSection.classList.remove('d-none');
  countBadge.textContent = absentList.length;

  const totalPeriods = absentList.reduce((sum, a) => sum + a.selectedPeriods.length, 0);
  if (totalPeriods > 0) {
    arrangeButtons.classList.remove('d-none');
    document.getElementById('autoArrange').innerHTML =
      `<i class="bi bi-lightning-fill"></i> 一键自动安排（${absentList.length} 位老师，${totalPeriods} 节课）`;
  } else {
    arrangeButtons.classList.add('d-none');
  }

  container.innerHTML = absentList.map(a => {
    const classesHtml = a.classes.length === 0
      ? '<div class="text-muted small ms-2">当天没有课程安排</div>'
      : a.classes.map(c => {
          const checked = a.selectedPeriods.includes(c.period) ? 'checked' : '';
          return `<div class="form-check form-check-inline ms-2">
            <input class="form-check-input" type="checkbox" ${checked}
                   onchange="togglePeriod(${a.id}, ${c.period})" id="cb_${a.id}_${c.period}">
            <label class="form-check-label small" for="cb_${a.id}_${c.period}">
              第${c.period}节 <span class="text-muted">${c.class_info}/${c.subject}</span>
            </label>
          </div>`;
        }).join('');

    return `<div class="border rounded p-2 mb-2">
      <div class="d-flex justify-content-between align-items-center">
        <strong><i class="bi bi-person-x text-danger"></i> ${a.full_code}</strong>
        <div>
          <span class="badge bg-info">${a.selectedPeriods.length}/${a.classes.length} 节</span>
          <button class="btn btn-sm btn-outline-danger ms-1" onclick="removeAbsentTeacher(${a.id})" title="移除">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
      <div class="mt-1">${classesHtml}</div>
    </div>`;
  }).join('');
}

function collectAllTasks() {
  const tasks = [];
  absentList.forEach(a => {
    a.selectedPeriods.forEach(p => {
      const cls = a.classes.find(c => c.period === p);
      if (cls) {
        tasks.push({
          teacherId: a.id,
          teacherName: a.full_code,
          period: cls.period,
          class_info: cls.class_info,
          subject: cls.subject
        });
      }
    });
  });
  tasks.sort((a, b) => a.period - b.period || a.teacherName.localeCompare(b.teacherName));
  return tasks;
}

// --- Auto arrange ---
async function doAutoArrange() {
  const tasks = collectAllTasks();
  if (tasks.length === 0) { alert('请至少勾选一个节次'); return; }

  const dateStr = document.getElementById('dateInput').value;
  const dow = getDayOfWeek(dateStr);
  const btn = document.getElementById('autoArrange');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 自动安排中...';

  // Fetch latest records
  await fetchAllRecords(true);

  const results = [];
  for (const task of tasks) {
    const candidates = recommendSubstitutes(dateStr, dow, task.period, task.teacherName);
    if (candidates.length > 0) {
      const best = candidates[0];
      // Save to Google Sheets
      try {
        const resp = await gsApi({
          action: 'add_record',
          date: dateStr,
          absent_teacher: task.teacherName,
          substitute_teacher: best.full_code,
          period: task.period,
          original_class: task.class_info,
          original_subject: task.subject
        });
        // Add to local cache
        cachedRecords.push({
          id: resp.id,
          date: dateStr,
          absent_teacher: task.teacherName,
          substitute_teacher: best.full_code,
          period: task.period,
          original_class: task.class_info,
          original_subject: task.subject
        });
        results.push({ ...task, success: true, substitute_name: best.full_code, total_subs: best.total_subs, tag: best.tag, consecutive: best.consecutive, consecutive_warning: best.consecutive_warning });
      } catch (e) {
        results.push({ ...task, success: false, error: e.message });
      }
    } else {
      results.push({ ...task, success: false, error: '没有可用的代课老师' });
    }
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="bi bi-lightning-fill"></i> 一键自动安排';
  showAutoResults(results, tasks);
  loadTodaySummary();
}

function showAutoResults(results, tasks) {
  const panel = document.getElementById('recommendPanels');
  panel.innerHTML = '';
  document.getElementById('placeholder').classList.add('d-none');
  document.getElementById('recommendSection').classList.remove('d-none');

  const successCount = results.filter(r => r.success).length;
  const failCount = results.filter(r => !r.success).length;
  panel.innerHTML += `
    <div class="alert ${failCount === 0 ? 'alert-success' : 'alert-warning'} d-flex align-items-center">
      <i class="bi ${failCount === 0 ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'} me-2" style="font-size:1.3rem;"></i>
      <div>自动安排完成：<strong>${successCount}</strong> 节已安排${failCount > 0 ? `，<strong class="text-danger">${failCount}</strong> 节未能安排` : ''}</div>
    </div>
  `;

  results.forEach((r) => {
    const cardId = `auto_${r.teacherId}_${r.period}`;
    if (r.success) {
      let badges = '';
      if (r.tag === 'early') badges += ' <span class="badge bg-info text-dark">需提前上班</span>';
      if (r.tag === 'late') badges += ' <span class="badge bg-info text-dark">需延迟下班</span>';
      if (r.consecutive_warning) badges += ` <span class="badge bg-danger">连续${r.consecutive}节</span>`;

      panel.innerHTML += `
        <div class="card mb-2" id="${cardId}">
          <div class="card-body py-2 px-3 d-flex justify-content-between align-items-center">
            <div>
              <span class="period-badge period-busy me-2">${r.period}</span>
              <span class="text-muted">${r.class_info}/${r.subject}</span>
              <span class="text-danger ms-1">(${r.teacherName})</span>
              <i class="bi bi-arrow-right mx-2"></i>
              <strong class="text-success">${r.substitute_name}</strong>
              <small class="text-muted ms-1">累计${r.total_subs}次</small>
              ${badges}
            </div>
            <button class="btn btn-sm btn-outline-secondary" onclick="changeSubstitute('${esc(r.teacherName)}', ${r.period}, '${esc(r.class_info)}', '${esc(r.subject)}', '${cardId}')">
              <i class="bi bi-arrow-repeat"></i> 更换
            </button>
          </div>
        </div>
      `;
    } else {
      panel.innerHTML += `
        <div class="card mb-2 border-danger" id="${cardId}">
          <div class="card-body py-2 px-3 d-flex justify-content-between align-items-center">
            <div>
              <span class="period-badge period-outside me-2">${r.period}</span>
              <span class="text-muted">${r.class_info}/${r.subject}</span>
              <span class="text-danger ms-1">(${r.teacherName})</span>
              <i class="bi bi-arrow-right mx-2"></i>
              <span class="text-danger"><i class="bi bi-x-circle"></i> 无可用老师</span>
            </div>
            <button class="btn btn-sm btn-outline-primary" onclick="manualPickForPeriod('${esc(r.teacherName)}', ${r.period}, '${esc(r.class_info)}', '${esc(r.subject)}', '${cardId}')">
              <i class="bi bi-hand-index"></i> 手动选择
            </button>
          </div>
        </div>
      `;
    }
  });
}

function esc(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

async function changeSubstitute(absentTeacherName, period, classInfo, subject, cardId) {
  const dateStr = document.getElementById('dateInput').value;
  const dow = getDayOfWeek(dateStr);
  const card = document.getElementById(cardId);

  // Delete existing record for this absent teacher + period
  const existing = cachedRecords.find(r => r.absent_teacher === absentTeacherName && parseInt(r.period) === period && r.date === dateStr);
  if (existing) {
    try { await gsApi({ action: 'delete_record', id: existing.id }); } catch(e) {}
    cachedRecords = cachedRecords.filter(r => r.id !== existing.id);
  }

  const candidates = recommendSubstitutes(dateStr, dow, period, absentTeacherName);
  card.innerHTML = `
    <div class="card-header py-2">
      <i class="bi bi-clock"></i> 第${period}节 — <span class="text-danger">${absentTeacherName}</span> — ${classInfo} / ${subject}
      <span class="badge bg-warning float-end">重新选择</span>
    </div>
    <div class="card-body p-0"></div>
  `;
  const body = card.querySelector('.card-body');
  if (candidates.length === 0) {
    body.innerHTML = '<div class="alert alert-warning m-3">没有可用的代课老师</div>';
  } else {
    body.innerHTML = buildCandidateTable(candidates, absentTeacherName, period, classInfo, subject);
  }
  loadTodaySummary();
}

function manualPickForPeriod(absentTeacherName, period, classInfo, subject, cardId) {
  const dateStr = document.getElementById('dateInput').value;
  const dow = getDayOfWeek(dateStr);
  const card = document.getElementById(cardId);

  const candidates = recommendSubstitutes(dateStr, dow, period, absentTeacherName);
  card.className = 'card mb-2';
  card.innerHTML = `
    <div class="card-header py-2">
      <i class="bi bi-clock"></i> 第${period}节 — <span class="text-danger">${absentTeacherName}</span> — ${classInfo} / ${subject}
    </div>
    <div class="card-body p-0"></div>
  `;
  const body = card.querySelector('.card-body');
  if (candidates.length === 0) {
    body.innerHTML = '<div class="alert alert-warning m-3">没有可用的代课老师</div>';
  } else {
    body.innerHTML = buildCandidateTable(candidates, absentTeacherName, period, classInfo, subject);
  }
}

function buildCandidateTable(candidates, absentTeacherName, period, classInfo, subject) {
  const TAG_LABELS = {
    normal: '',
    early: '<span class="badge bg-info text-dark">需提前上班</span>',
    late: '<span class="badge bg-info text-dark">需延迟下班</span>'
  };

  const hasNormal = candidates.some(c => c.tag === 'normal');
  const hasExtended = candidates.some(c => c.tag !== 'normal');

  let html = '<div class="candidate-scroll"><table class="table table-sm table-hover mb-0"><thead class="sticky-top bg-white"><tr><th>老师</th><th>状态</th><th>累计代课</th><th>今日代课</th><th></th></tr></thead><tbody>';

  let shownDivider = false;
  candidates.forEach(c => {
    if (!shownDivider && hasNormal && hasExtended && c.tag !== 'normal') {
      shownDivider = true;
      html += `<tr><td colspan="5" class="text-center text-muted small bg-light py-1">
        <i class="bi bi-info-circle"></i> 以下老师需要调整上下班时间
      </td></tr>`;
    }

    let statusHtml = TAG_LABELS[c.tag] || '';
    if (c.consecutive_warning) statusHtml += ` <span class="badge bg-danger">连续${c.consecutive}节</span>`;

    const timeInfo = c.tag !== 'normal' ? `<br><small class="text-muted">原上班: 第${c.first_period}-${c.last_period}节</small>` : '';
    const rowClass = c.consecutive_warning ? 'table-warning' : (c.tag !== 'normal' ? 'table-light' : '');

    html += `<tr class="candidate-row ${rowClass}">
      <td>${c.full_code}${timeInfo}</td>
      <td>${statusHtml}</td>
      <td><span class="badge bg-secondary">${c.total_subs}次</span></td>
      <td><span class="badge ${c.today_subs > 0 ? 'bg-warning text-dark' : 'bg-success'}">${c.today_subs}次</span></td>
      <td><button class="btn btn-sm btn-primary" onclick="assignSubstitute('${esc(absentTeacherName)}', ${period}, '${esc(c.full_code)}', '${esc(classInfo)}', '${esc(subject)}')">
        <i class="bi bi-check-lg"></i> 选择
      </button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

// Manual arrange
function doManualArrange() {
  const tasks = collectAllTasks();
  if (tasks.length === 0) { alert('请至少勾选一个节次'); return; }

  const dateStr = document.getElementById('dateInput').value;
  const dow = getDayOfWeek(dateStr);

async function assignSubstitute(absentTeacherName, period, subTeacherName, classInfo, subject) {
  const dateStr = document.getElementById('dateInput').value;

  try {
    const resp = await gsApi({
      action: 'add_record',
      date: dateStr,
      absent_teacher: absentTeacherName,
      substitute_teacher: subTeacherName,
      period: period,
      original_class: classInfo,
      original_subject: subject
    });

    cachedRecords.push({
      id: resp.id,
      date: dateStr,
      absent_teacher: absentTeacherName,
      substitute_teacher: subTeacherName,
      period: period,
      original_class: classInfo,
      original_subject: subject
    });

    // Update UI - find the card for this task
    const absentTeacher = absentList.find(a => a.full_code === absentTeacherName);
    const teacherId = absentTeacher ? absentTeacher.id : 0;

    // Check auto card
    const autoCard = document.getElementById(`auto_${teacherId}_${period}`);
    if (autoCard) {
      autoCard.innerHTML = `
        <div class="card-body py-2 px-3 d-flex justify-content-between align-items-center">
          <div>
            <span class="period-badge period-busy me-2">${period}</span>
            <span class="text-muted">${classInfo}/${subject}</span>
            <span class="text-danger ms-1">(${absentTeacherName})</span>
            <i class="bi bi-arrow-right mx-2"></i>
            <strong class="text-success">${subTeacherName}</strong>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="changeSubstitute('${esc(absentTeacherName)}', ${period}, '${esc(classInfo)}', '${esc(subject)}', 'auto_${teacherId}_${period}')">
            <i class="bi bi-arrow-repeat"></i> 更换
          </button>
        </div>
      `;
    }

    // Check rec card
    const recCard = document.getElementById(`rec_${teacherId}_${period}`);
    if (recCard) {
      const statusEl = document.getElementById(`status_${teacherId}_${period}`);
      if (statusEl) {
        statusEl.className = 'badge bg-success float-end';
        statusEl.textContent = '已安排: ' + subTeacherName;
      }
      const body = recCard.querySelector('.card-body');
      body.innerHTML = `<div class="alert alert-success m-3 mb-0"><i class="bi bi-check-circle"></i> 已安排 <strong>${subTeacherName}</strong> 代课</div>`;
    }

    loadTodaySummary();
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

    (r.absent_teacher || '').toLowerCase().includes(teacherQ) ||

  if (records.length === 0) {
    tbody.innerHTML = '';
    noRec.classList.remove('d-none');

  noRec.classList.add('d-none');

      <td>${r.date}</td>
      <td>${r.period}</td>
      <td>${r.original_class || ''}</td>

}

async function deleteRecordFromPage(id) {
  if (!confirm('确定要删除这条记录吗？')) return;

    await gsApi({ action: 'delete_record', id: id });
    cachedRecords = cachedRecords.filter(r => r.id !== id);
    loadRecords();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

function initStatYears() {
  const sel = document.getElementById('statYear');
  const currentYear = new Date().getFullYear();
  sel.innerHTML = '<option value="">全部年份</option>';
  for (let y = currentYear; y >= currentYear - 5; y--) {
    sel.innerHTML += `<option value="${y}">${y}年</option>`;
  }
}

async function loadStats() {
  await fetchAllRecords(true);

  const year = document.getElementById('statYear').value;
  const month = document.getElementById('statMonth').value;

  let records = [...cachedRecords];
  if (year) {
    records = records.filter(r => r.date && r.date.startsWith(year));
    if (month) {
      const mm = month.padStart(2, '0');
      records = records.filter(r => r.date && r.date.startsWith(year + '-' + mm));
    }
  }

  // Sub counts
  const subCounts = {};
  records.forEach(r => {
    if (r.substitute_teacher) {
      subCounts[r.substitute_teacher] = (subCounts[r.substitute_teacher] || 0) + 1;
    }
  });

  const sorted = Object.entries(subCounts).sort((a, b) => b[1] - a[1]);
  const tbody = document.getElementById('statsBody');
  tbody.innerHTML = sorted.map(([name, count], i) =>
    `<tr><td>${i + 1}</td><td>${name}</td><td><span class="badge bg-primary">${count}次</span></td></tr>`
  ).join('');
  if (sorted.length === 0) tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">暂无数据</td></tr>';

  // Absent counts
  const absentCounts = {};
  records.forEach(r => {
    if (r.absent_teacher) {
      absentCounts[r.absent_teacher] = (absentCounts[r.absent_teacher] || 0) + 1;
    }
  });

  const absentSorted = Object.entries(absentCounts).sort((a, b) => b[1] - a[1]);
  const absentBody = document.getElementById('absentStatsBody');
  absentBody.innerHTML = absentSorted.map(([name, count], i) =>
    `<tr><td>${i + 1}</td><td>${name}</td><td><span class="badge bg-danger">${count}次</span></td></tr>`
  ).join('');
  if (absentSorted.length === 0) absentBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">暂无数据</td></tr>';
}

function exportStats() {
  const year = document.getElementById('statYear').value;
  const month = document.getElementById('statMonth').value;

  let records = [...cachedRecords];
  if (year) {
    records = records.filter(r => r.date && r.date.startsWith(year));
    if (month) {
      const mm = month.padStart(2, '0');
      records = records.filter(r => r.date && r.date.startsWith(year + '-' + mm));
    }
  }

  const subCounts = {};
  records.forEach(r => {
    if (r.substitute_teacher) subCounts[r.substitute_teacher] = (subCounts[r.substitute_teacher] || 0) + 1;
  });

  const sorted = Object.entries(subCounts).sort((a, b) => b[1] - a[1]);
  const wsData = [['老师', '代课次数'], ...sorted];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, '代课统计');
  const filename = `代课统计${year ? '_' + year : ''}${month ? '_' + month + '月' : ''}.xlsx`;
  XLSX.writeFile(wb, filename);
}

// ============================================================
// UI: SETTINGS PAGE
// ============================================================
function saveApiUrl() {
  const url = document.getElementById('apiUrlInput').value.trim();
  const statusEl = document.getElementById('apiStatus');

  if (!url) {
    statusEl.innerHTML = '<div class="alert alert-warning py-1">请输入 URL</div>';
    return;
  }

  apiUrl = url;
  localStorage.setItem(LS_API_URL, url);

  statusEl.innerHTML = '<div class="alert alert-info py-1"><span class="spinner-border spinner-border-sm"></span> 测试连接中...</div>';

  gsApi({ action: 'get_records' })
    .then(data => {
      if (data.error) throw new Error(data.error);
      cachedRecords = data.records || [];
      cachedRecordsLoaded = true;
      statusEl.innerHTML = `<div class="alert alert-success py-1"><i class="bi bi-check-circle"></i> 连接成功！已读取 ${cachedRecords.length} 条记录</div>`;
      loadTodaySummary();
    })
    .catch(e => {
      statusEl.innerHTML = `<div class="alert alert-danger py-1"><i class="bi bi-x-circle"></i> 连接失败: ${e.message}</div>`;
    });
}

function renderPeriodTimesEditor() {
  const el = document.getElementById('periodTimesEditor');
  let html = '';
  for (let p = 1; p <= 10; p++) {
    html += `<div class="row g-2 mb-1">
      <div class="col-3"><label class="form-label mb-0">第${p}节</label></div>
      <div class="col-9"><input type="text" class="form-control form-control-sm" id="pt_${p}" value="${periodTimes[p] || ''}"></div>
    </div>`;
  }
  el.innerHTML = html;
}

function savePeriodTimes() {
  for (let p = 1; p <= 10; p++) {
    const val = document.getElementById('pt_' + p).value.trim();
    if (val) periodTimes[p] = val;
  }
  localStorage.setItem(LS_PERIOD_TIMES, JSON.stringify(periodTimes));
  alert('时间设置已保存');
}

function exportLocalData() {
  const data = {
    teachers: teachers,
    timetable: timetable,
    periodTimes: periodTimes,
    apiUrl: apiUrl,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '代课系统备份_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
}

function importLocalData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.teachers) { teachers = data.teachers; saveTeachers(); }
      if (data.timetable) { timetable = data.timetable; saveTimetable(); }
      if (data.periodTimes) { periodTimes = data.periodTimes; localStorage.setItem(LS_PERIOD_TIMES, JSON.stringify(periodTimes)); }
      if (data.apiUrl) { apiUrl = data.apiUrl; localStorage.setItem(LS_API_URL, apiUrl); }
      alert('数据导入成功！');
      location.reload();
    } catch (err) {
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function clearLocalData() {
  if (!confirm('确定要清除所有本地数据吗？（课表和设置将被清除，Google Sheets 上的记录不受影响）')) return;
  localStorage.removeItem(LS_TEACHERS);
  localStorage.removeItem(LS_TIMETABLE);
  localStorage.removeItem(LS_PERIOD_TIMES);
  teachers = [];
  timetable = [];
  periodTimes = { ...DEFAULT_PERIOD_TIMES };
  alert('本地数据已清除');
  location.reload();
}

// ============================================================
// INITIALIZATION
// ============================================================
async function init() {
  loadLocalData();

  // Set today's date
  const today = new Date();
  document.getElementById('dateInput').value = today.toISOString().slice(0, 10);
  updateDayLabel();

  // Check if setup needed
  if (teachers.length === 0 || !apiUrl) {
    showPage('settings');
    if (teachers.length === 0) {
      document.getElementById('importStatus').innerHTML = '<div class="alert alert-info py-1">请先导入课表 Excel 文件（组合.xlsx）</div>';
    }
    if (!apiUrl) {
      document.getElementById('apiStatus').innerHTML = '<div class="alert alert-info py-1">请配置 Google Apps Script URL 以启用记录存储</div>';
    }
    return;
  }

  // Load records from Google Sheets
  showLoading('加载代课记录...');
  try {
    await fetchAllRecords(true);
  } catch(e) {
    console.warn('Failed to fetch records', e);
  }
  hideLoading();
  loadTodaySummary();
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '加载中...';
  document.getElementById('loadingOverlay').classList.remove('d-none');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('d-none');
}

// Start
init();
</script>
